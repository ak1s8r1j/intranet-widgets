<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; font-family: -apple-system, "Segoe UI", sans-serif; }
  .card { background:#005687; border-radius:12px; padding:1.5rem 1.5rem 1.75rem; box-sizing:border-box; }
  h2 { margin:0 0 4px; font-size:18px; font-weight:600; color:white; }
  .subtitle { margin:0 0 16px; font-size:13px; color:#ffffff; }
  .pills { display:flex; flex-wrap:wrap; gap:8px; }
  .pill { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.08); color:white; font-size:13px; padding:7px 14px; border-radius:999px; }
  .code { font-size:10px; font-weight:700; color:darkgrey; }
</style>
</head>
<body>
  <div class="card">
    <h2>Our global presence</h2>
    <p class="subtitle">7 offices &middot; 40+ people &middot; 15 nationalities</p>
    <div class="pills">
      <span class="pill"><span class="code">DK</span>Copenhagen</span>
      <span class="pill"><span class="code">AE</span>Dubai</span>
      <span class="pill"><span class="code">NO</span>Oslo</span>
      <span class="pill"><span class="code">AO</span>Angola</span>
      <span class="pill"><span class="code">ZA</span>South Africa</span>
      <span class="pill"><span class="code">SG</span>Singapore</span>
      <span class="pill"><span class="code">MX</span>Mexico</span>
    </div>
  </div>
</body>
</html>
